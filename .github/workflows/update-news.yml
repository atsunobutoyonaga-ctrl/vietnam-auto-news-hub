name: Update News

# 手動実行のみ (Actions タブの "Run workflow" ボタン)
on:
  workflow_dispatch:

# 自分自身のリポジトリにコミットを書き戻す権限
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/main.py

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain docs/data/news.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/data/news.json
            git commit -m "Auto-update news.json (workflow_dispatch)"
            git push
            echo "Updated."
          else
            echo "No changes to commit."
          fi
