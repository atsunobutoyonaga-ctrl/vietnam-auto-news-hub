name: Update News

# 手動実行 + 平日朝7時(ベトナム時間)の自動実行
on:
  workflow_dispatch:
  schedule:
    # 平日 月-金 の 0:00 UTC = 7:00 ベトナム時間
    # cron: 分 時 日 月 曜日 (1=月..5=金)
    - cron: "0 0 * * 1-5"

# 自分自身のリポジトリにコミットを書き戻す権限
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/main.py

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain docs/data/news.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/data/news.json
            git commit -m "Auto-update news.json (${{ github.event_name }})"
            git push
            echo "Updated."
          else
            echo "No changes to commit."
          fi
